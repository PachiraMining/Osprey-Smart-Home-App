<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Osprey Smart Home</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        .container {
            text-align: center;
            padding: 40px 24px;
            max-width: 600px;
        }
        .logo {
            font-size: 4rem;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .tagline {
            font-size: 1.2rem;
            color: #a0c4ff;
            margin-bottom: 40px;
        }
        .links {
            display: flex;
            flex-direction: column;
            gap: 12px;
            align-items: center;
        }
        .links a {
            display: inline-block;
            padding: 12px 32px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            transition: background 0.2s;
            width: 250px;
        }
        .links a:hover {
            background: rgba(255,255,255,0.2);
        }
        footer {
            margin-top: 48px;
            color: rgba(255,255,255,0.4);
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🏠</div>
        <h1>Osprey Smart Home</h1>
        <p class="tagline">Your home, intelligently connected</p>
        <div class="links">
            <a href="privacy-policy.html">Privacy Policy</a>
            <a href="support.html">Support</a>
            <a href="delete-account.html">Delete Account</a>
        </div>
        <footer>&copy; 2026 Osprey Technology</footer>
    </div>
</body>
</html>
